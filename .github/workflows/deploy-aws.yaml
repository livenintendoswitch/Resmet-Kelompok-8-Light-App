name: deploy to aws fargate

on: 
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Fargate
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v5

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push Backend image
      id: build-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{secrets.AWS_ECR_BACKEND}}:$IMAGE_TAG ./backend
        docker push $ECR_REGISTRY/${{secrets.AWS_ECR_BACKEND}}:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/${{secrets.AWS_ECR_BACKEND}}:$IMAGE_TAG" >> $GITHUB_OUTPUT
        

    - name: Build, tag, and push Frontend image
      id: build-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/${{secrets.AWS_ECR_FRONTEND}}:$IMAGE_TAG ./frontend
        docker push $ECR_REGISTRY/${{secrets.AWS_ECR_FRONTEND}}:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/${{secrets.AWS_ECR_FRONTEND}}:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the Backend image ID
      id: task-def-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ./task-definitions.json
        container-name: BackendApp  
        image: ${{ steps.build-backend.outputs.image }}

    - name: Fill in the Frontend image ID
      id: task-def-frontend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-backend.outputs.task-definition }} 
        container-name: FrontendApp 
        image: ${{ steps.build-frontend.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
        service: ${{ secrets.ECS_SERVICE }}
        cluster: ${{ secrets.ECS_CLUSTER }}
