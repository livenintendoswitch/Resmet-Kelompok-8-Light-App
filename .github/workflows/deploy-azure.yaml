name: Deploy to Azure
on:
  push:
    branches:
      - azure 

permissions:
  id-token: write
  contents: read

# EXPLICIT CONFIGURATION MAP
env:
  AZURE_RESOURCE_GROUP: benchmark-apps-rg
  AZURE_CONTAINER_REGISTRY: benchmarkacrkel8
  BACKEND_APP_NAME: light-app-service
  FRONTEND_APP_NAME: light-app-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build and Deploy Backend API
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
        acrName: ${{ env.AZURE_CONTAINER_REGISTRY }}
        containerAppName: ${{ env.BACKEND_APP_NAME }}
        appSourcePath: ./backend
        dockerfilePath: dockerfile
        imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/light-app-backend:${{ github.sha }}

    - name: Build and Deploy Frontend UI
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
        acrName: ${{ env.AZURE_CONTAINER_REGISTRY }}
        containerAppName: ${{ env.FRONTEND_APP_NAME }}
        appSourcePath: ./frontend
        dockerfilePath: dockerfile
        imageToDeploy: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/light-app-frontend:${{ github.sha }}
        buildArgs: |
          VITE_API_URL=https://${{ env.BACKEND_APP_NAME }}.${{ env.AZURE_RESOURCE_GROUP }}.southeastasia.azurecontainerapps.io